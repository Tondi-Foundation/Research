summary: >
  This paper turns the March 2026 Elone Merkle design memorandum into an
  academic protocol draft. Under the name Elone Prism, it proposes a
  commitment-native channel architecture with dual-subtree state commitments,
  exact partition conservation, deterministic settlement, proof-first
  witnesses, and a migration path away from plaintext-authoritative channel
  state.
