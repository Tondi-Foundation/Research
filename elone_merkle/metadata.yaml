summary: >
  This paper turns the March 2026 Elone Merkle design memorandum into a
  formalized protocol-design draft. Under the name Elone Prism, it proposes a
  commitment-native channel architecture with dual-subtree state commitments,
  explicit partition assignment, exact partition conservation, deterministic
  settlement, proof-first witnesses, a state-package recovery model, and a
  benchmark agenda for the systems questions that remain open.
