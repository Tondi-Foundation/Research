summary: >
  Elone proposes a consensus-embedded payment-channel architecture built on a
  dual-track UTXO model with native transaction typing, reference-based fund
  access, and atomic topology reconfiguration. The March 2026 paper snapshot is
  partially implementation-backed: consensus tx types, SDK builders,
  engine/store split, and low-level RPC exist, while channel-factory lifecycle,
  production PTLC execution, and PSTT-style coordination remain incomplete.
