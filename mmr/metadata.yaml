summary: >
  This paper introduces consensus-level execution-log commitments for
  GHOSTDAG-based PoW DAG ledgers using Merkle Mountain Ranges. Its central proof
  object is an execution position receipt that binds a transaction to actual
  consensus execution order and enables logarithmic verification for old
  transactions, bridges, and light clients.
